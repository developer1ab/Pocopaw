        buildConfigField "String", "GEMINI_MODEL_FAST", asBuildConfigString(readPrototypeProperty(["GEMINI_MODEL_FAST"], "gemini-3.5-flash"))
        buildConfigField "String", "GEMINI_MODEL_EXPERT", asBuildConfigString(readPrototypeProperty(["GEMINI_MODEL_EXPERT"], "gemini-3.1-pro-preview"))
        buildConfigField "String", "QWEN_VISION_API_KEY", asBuildConfigString(readPrototypeProperty(["QWEN_VISION_API_KEY", "DASHSCOPE_API_KEY"]))
        buildConfigField "String", "QWEN_VISION_MODEL_FAST", asBuildConfigString(readPrototypeProperty(["QWEN_VISION_MODEL_FAST"], "qwen3.5-plus"))
        buildConfigField "String", "QWEN_VISION_MODEL_EXPERT", asBuildConfigString(readPrototypeProperty(["QWEN_VISION_MODEL_EXPERT"], "qwen3.6-plus"))
        buildConfigField "String", "QWEN_VISION_MODEL", asBuildConfigString(readPrototypeProperty(["QWEN_VISION_MODEL"], "qwen3.6-plus"))
        buildConfigField "String", "QWEN_VISION_ENDPOINT", asBuildConfigString(readPrototypeProperty(["QWEN_VISION_ENDPOINT"], "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"))
