import java.util.Properties

plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

def readPrototypeProperty = { Object keyOrKeys, String fallbackValue = "" ->
    def keys = keyOrKeys instanceof Collection ? keyOrKeys : [keyOrKeys]
    def candidates = [
            rootProject.file("local.properties")
    ]
    for (def file : candidates) {
        if (!file.exists()) {
            continue
        }
        def properties = new Properties()
        file.withInputStream { stream ->
            properties.load(stream)
        }
        for (def key : keys) {
            def value = properties.getProperty(key)
            if (value != null && !value.trim().isEmpty()) {
                return value.trim()
            }
        }
    }
    return fallbackValue
}

def asBuildConfigString = { String value ->
    return '"' + value.replace('\\', '\\\\').replace('"', '\\"') + '"'
}

android {
    namespace 'com.atombits.pocopaw'
    compileSdk 33
    buildToolsVersion '35.0.0'

    defaultConfig {
        applicationId "com.atombits.pocopaw"
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        buildConfigField "String", "DEEPSEEK_API_KEY", asBuildConfigString(readPrototypeProperty(["DEEPSEEK_API_KEY"]))
        buildConfigField "String", "DEEPSEEK_MODEL", asBuildConfigString(readPrototypeProperty(["DEEPSEEK_MODEL"], "deepseek-v4-flash"))
        buildConfigField "String", "DEEPSEEK_MODEL_FAST", asBuildConfigString(readPrototypeProperty(["DEEPSEEK_MODEL_FAST"], "deepseek-v4-flash"))
        buildConfigField "String", "DEEPSEEK_MODEL_EXPERT", asBuildConfigString(readPrototypeProperty(["DEEPSEEK_MODEL_EXPERT"], "deepseek-v4-pro"))
        buildConfigField "String", "DEEPSEEK_ENDPOINT", asBuildConfigString(readPrototypeProperty(["DEEPSEEK_ENDPOINT"], "https://api.deepseek.com/chat/completions"))
